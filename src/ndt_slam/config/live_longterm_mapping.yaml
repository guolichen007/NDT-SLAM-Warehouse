# 长期建图配置文件
# 用于 warehouse_live_longterm_mapping.launch

# 点云话题
pointcloud_topic: "/merged_points"
odom_topic: "/odom"
pose_topic: "/current_pose"
map_topic: "/map"
current_cloud_topic: "/mapping_current_cloud"

# 坐标系
odom_frame: "odom"
base_frame: "base_link"
map_frame: "map"

# 发布 TF
publish_tf: true

# 地图参数
map_voxel_size: 0.30
display_voxel_size: 0.10
ground_voxel_size: 0.15
objects_voxel_size: 0.08
max_map_size: 200.0
use_voxel_filter: true
map_update_interval: 1

# 网格地面模型
grid_cell_size: 2.0
height_above_ground: 0.35

# 近场过滤
near_field_radius: 4.0
near_field_z_min: 3.0

# NDT_OMP 配置
ndt_omp:
  resolution: 1.0
  step_size: 0.1
  transformation_epsilon: 0.01
  max_iterations: 50

# 动态点过滤
dynamic_filter:
  enabled: true
  mean_k: 20
  stddev_mul_thresh: 1.5

# 特征提取
feature_extraction:
  enabled: false
  voxel_size: 0.20
  height_diff_threshold: 0.10
  feature_weight: 8

# 闭环检测
loop_closure:
  enabled: true
  detection_interval: 20

# ========== 长期建图配置 ==========

# 长期建图模式
longterm_mapping:
  enabled: true
  commit_enabled: true          # observe_only 模式时设为 false

# MotionGate：静止检测和门控
motion_gate:
  enabled: true
  min_translation_m: 0.30      # 最小位移（米）
  min_rotation_deg: 3.0        # 最小旋转（度）
  min_time_between_keyframes_sec: 2.0  # 最小时间间隔（秒）

# 关键帧 active window
online_cache:
  max_active_keyframes: 80     # 最大活跃关键帧数
  release_check_interval: 10   # 检查释放间隔（帧数）

# 磁盘增量保存
persistent_map:
  enabled: true
  root_dir: "/home/ydkj/NDT-slam-ws/maps/live/current"
  tile_size_m: 20.0            # tile 大小（米）
  flush_interval_sec: 60       # flush 间隔（秒）
  max_dirty_tiles_in_memory: 20  # 最大 dirty tile 数量
  write_tmp_then_rename: true  # 先写临时文件再重命名
  tile_voxel_registration: 0.30
  tile_voxel_display: 0.10
  tile_voxel_ground: 0.15
  tile_voxel_objects: 0.08

# 磁盘保护
disk_guard:
  enabled: true
  min_free_disk_gb: 50         # 最小空闲磁盘空间（GB）
  pause_mapping_when_low: true # 磁盘空间不足时暂停写入

# 内存保护（分级）
memory_guard:
  enabled: true
  soft_threshold_mb: 6000      # 6GB: 释放缓存 + flush dirty tiles
  hard_threshold_mb: 7000      # 7GB: 暂停地图 commit（NDT/TF 继续）
  emergency_threshold_mb: 8000 # 8GB: 降采样 active map
  check_interval_sec: 30       # 每 30 秒检查一次

# Active map 重建策略
active_map:
  max_active_keyframes: 80
  rebuild_every_keyframes: 10
  registration_voxel: 0.30
  display_voxel: 0.10
  objects_voxel: 0.08

# 雷达断流检测
pointcloud_watchdog:
  stale_timeout_sec: 10.0

# NDT 健康监控
ndt_health:
  fitness_warning_threshold: 2.0
  fitness_warning_count: 50

# 天车运动约束（三自由度建图：x/y/yaw 自由，z/roll/pitch 锁定）
crane_motion_constraint:
  enabled: true
  lock_z: true                # z 锁定（天车雷达高度固定）
  fixed_z_source: "config"    # config: 使用 fixed_z 值; first_frame: 使用第一帧值
  fixed_z: 0.0                # 固定 z 值（map 坐标系下 base_link 高度）
  constrain_z: false          # 不使用限幅模式
  lock_roll: true             # roll 锁定（天车不翻转）
  lock_pitch: true            # pitch 锁定（天车不俯仰）
  lock_yaw: false             # yaw 不锁定（NDT 需要横向自由度）
  constrain_yaw: false        # yaw 完全放开
  max_abs_z_drift: 0.05       # z 最大允许漂移（仅 constrain_z=true 时生效）
  max_roll_deg: 0.3           # roll 最大允许漂移（度）
  max_pitch_deg: 0.3          # pitch 最大允许漂移（度）
  max_yaw_deg: 10.0           # yaw 限幅（仅 constrain_yaw=true 时生效）

# ========== 吊货过滤配置 ==========

# BasePayloadChannelFilter
base_payload_channel:
  enabled: true
  lateral_center: 0.0
  lateral_half_width: 3.0
  longitudinal_min: -10.0
  longitudinal_max: 10.0
  min_object_hag: 0.40
  min_payload_points: 20
  expand_xy: 0.5

# PayloadTrackManager
payload_tracker:
  enabled: true
  base_stability_std_thresh: 0.35

# DynamicEventManager
dynamic_event_manager:
  enabled: true
  payload_min_candidate_frames: 3
  payload_pre_guard_sec: 3.0
  moving_post_guard_sec: 2.0
  unknown_post_guard_sec: 5.0
  merge_same_track: true
  merge_time_gap_sec: 3.0
  merge_iou_thresh: 0.2
  max_active_sessions: 3
  placement_detection_enabled: true
  stable_window_sec: 4.0
  stable_frames_thresh: 5
  stable_map_disp_thresh_m: 0.15
  stable_velocity_thresh_mps: 0.04
  placed_bbox_expand_xy: 0.3
  placed_bbox_expand_z: 0.3
  clean_deny_enabled: true

# ========== 人体过滤配置 ==========

human_object_filter:
  enabled: true
  min_hag: 0.15           # P1: 降低到 0.15m
  max_hag: 2.30
  min_cluster_height: 0.40  # P1: 降低到 0.40m
  max_cluster_height: 2.20
  min_points: 5             # P1: 降低到 5，捕获弱小簇
  max_points: 500           # P1: 降低到 500
  min_area_m2: 0.04
  max_area_m2: 1.20
  max_width_m: 1.20         # P1: 降低到 1.20
  max_length_m: 1.20        # P1: 降低到 1.20
  bev_resolution: 0.10
  merge_gap_m: 0.15

  # P1: 区分 strong/weak 的阈值
  min_points_strong: 30     # >= 30 points: strong human/dynamic，直接删除
  min_points_weak: 5        # 5-30 points: weak transient，禁止进入地图

  # P1: deny history 配置
  human_deny_ttl: 15.0      # 人员 deny cells 保留 15 秒

# HumanObjectTracking（人体跟踪）
human_object_tracking:
  enabled: true
  window_sec: 2.0
  confirm_frames: 2
  map_displacement_thresh_m: 0.20
  velocity_thresh_mps: 0.10
  max_match_distance_m: 0.80
  max_missed_frames: 5

# HumanObjectEraser（人体历史反删）
human_object_eraser:
  enabled: true
  history_sec: 10.0
  capsule_radius_m: 0.65
  use_track_height_range: true
  z_margin_m: 0.30
  hag_margin_m: 0.30
  pre_guard_sec: 2.0
  post_guard_sec: 3.0
  erase_objects_only: true
  erase_ground: false
  async_update: true

# ========== CargoBoxEstimator 配置 ==========
cargo_box_estimator:
  enabled: true

  # 聚类参数
  min_cluster_points: 40
  max_cluster_points: 20000

  # BEV 连通域参数
  bev_resolution: 0.10
  bev_min_points_per_cell: 1
  bev_min_component_cells: 2
  bev_connectivity: 8

  # 悬空主体层检测
  min_hag_for_candidate: 0.20
  min_payload_bottom_hag: 0.45
  z_hist_bin: 0.10
  min_z_band_points: 5
  dense_bin_ratio: 0.15
  dense_bin_min_points: 2
  min_dense_band_height: 0.10
  max_dense_band_height: 3.50

  # 分位数参数
  xy_percentile_low: 2.0
  xy_percentile_high: 98.0
  z_percentile_low: 5.0
  z_percentile_high: 98.0

  # 轴向约束 OBB
  use_crane_axis_obb: true

  # 尺寸限制
  max_width: 6.0
  max_length: 16.0
  max_height: 5.0

  # 显示框扩展（core box）
  core_expand_xy: 0.05
  core_expand_z_down: 0.03
  core_expand_z_up: 0.10

  # 删除框扩展（remove box）
  remove_expand_xy: 0.25
  remove_expand_z_down: 0.05
  remove_expand_z_up: 0.20

  # 禁行区扩展
  forbidden_expand_xy: 0.50
  forbidden_height: 3.0

  # 尺寸增长率限制（防止框体突然变大）
  max_size_growth_ratio: 1.35

  # 最小悬空高度（不能作为吊货的最低 HAG）
  min_suspended_hag: 0.35

  # 最小 core points
  min_core_points: 5

  # 绝对尺寸约束
  max_core_length: 12.0
  max_core_width: 4.0
  max_core_height: 4.0
  min_core_length: 0.30
  min_core_width: 0.30
  min_core_height: 0.10

  # 初始化质量约束
  init_max_area: 30.0
  init_max_aspect_ratio: 8.0
  init_min_bottom_hag: 0.45
  init_min_core_points: 5
